<!DOCTYPE html>
<html lang="en">
<head>
  <title>Weather App</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --soil: #2c1a0e;
      --bark: #4a2f1a;
      --moss: #4a5e3a;
      --sage: #7a9e6e;
      --mist: #c8d8b8;
      --cream: #f5f0e8;
      --sand: #e8dcc8;
      --clay: #c4875a;
      --sky: #a8c8d8;
      --text: #2c1a0e;
      --text-light: #6b4c32;
    }

    body {
      font-family: 'Lato', sans-serif;
      background-color: #1a2e1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }

    /* Background texture layers */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(74, 94, 58, 0.6) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(44, 26, 14, 0.8) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 30%, rgba(122, 158, 110, 0.3) 0%, transparent 40%);
      z-index: 0;
    }

    /* Decorative leaf shapes */
    body::after {
      content: '🌿';
      position: fixed;
      font-size: 300px;
      bottom: -80px;
      right: -60px;
      opacity: 0.06;
      z-index: 0;
      filter: blur(2px);
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header-eyebrow {
      font-family: 'Lato', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--sage);
      margin-bottom: 8px;
    }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      font-weight: 700;
      color: var(--cream);
      line-height: 1;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .header h1 em {
      font-style: italic;
      color: var(--sage);
    }

    /* Search card */
    .search-card {
      background: rgba(245, 240, 232, 0.08);
      border: 1px solid rgba(200, 216, 184, 0.2);
      border-radius: 20px;
      padding: 24px;
      backdrop-filter: blur(16px);
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }

    #city-name {
      flex: 1;
      background: rgba(245, 240, 232, 0.12);
      border: 1px solid rgba(200, 216, 184, 0.25);
      border-radius: 12px;
      padding: 14px 18px;
      font-family: 'Lato', sans-serif;
      font-size: 15px;
      color: var(--cream);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    #city-name::placeholder { color: rgba(200, 216, 184, 0.5); }
    #city-name:focus {
      border-color: var(--sage);
      background: rgba(245, 240, 232, 0.18);
    }

    #search-button {
      background: var(--moss);
      color: var(--cream);
      border: none;
      border-radius: 12px;
      padding: 14px 22px;
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    #search-button:hover { background: var(--sage); }
    #search-button:active { transform: scale(0.97); }

    /* Weather result */
    #weather-result {
      background: rgba(245, 240, 232, 0.08);
      border: 1px solid rgba(200, 216, 184, 0.2);
      border-radius: 20px;
      backdrop-filter: blur(16px);
      overflow: hidden;
      min-height: 60px;
      transition: all 0.4s ease;
    }

    .weather-content {
      padding: 32px;
      animation: fadeUp 0.4s ease both;
    }

    .weather-city {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 4px;
    }
    .weather-country {
      font-size: 13px;
      color: var(--sage);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .weather-main {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }
    .weather-emoji {
      font-size: 64px;
      line-height: 1;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    }
    .weather-temp {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      font-weight: 700;
      color: var(--cream);
      line-height: 1;
    }
    .weather-temp sup {
      font-size: 24px;
      vertical-align: super;
      color: var(--sage);
    }

    .weather-desc {
      font-size: 16px;
      color: var(--mist);
      font-style: italic;
      text-transform: capitalize;
      margin-bottom: 28px;
      font-family: 'Playfair Display', serif;
    }

    .weather-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200, 216, 184, 0.2), transparent);
      margin-bottom: 20px;
    }

    .weather-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .detail-item {
      background: rgba(245, 240, 232, 0.06);
      border: 1px solid rgba(200, 216, 184, 0.12);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .detail-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--sage);
      margin-bottom: 4px;
    }
    .detail-value {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: var(--cream);
    }

    .error-msg {
      padding: 24px 32px;
      text-align: center;
      color: var(--clay);
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 16px;
    }

    .loading {
      padding: 24px 32px;
      text-align: center;
      color: var(--sage);
      font-size: 14px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-eyebrow">Natural Forecast</div>
      <h1>Weather<em>.</em></h1>
    </div>

    <div class="search-card">
      <input placeholder="Enter a city name..." id="city-name">
      <button id="search-button">Search</button>
    </div>

    <div id="weather-result"></div>
  </div>

  <!--Polished With AI-->
  
  <script>
    const apiKey = "c4c2b1d040d3ccd75d94357a38082f52";
    

    function getWeatherEmoji(description) {
      const d = description.toLowerCase();
      if (d.includes('thunder')) return '⛈️';
      if (d.includes('drizzle')) return '🌦️';
      if (d.includes('rain')) return '🌧️';
      if (d.includes('snow')) return '❄️';
      if (d.includes('mist') || d.includes('fog') || d.includes('haze')) return '🌫️';
      if (d.includes('clear')) return '☀️';
      if (d.includes('cloud')) return '☁️';
      if (d.includes('wind')) return '💨';
      return '🌤️';
    }

    async function getWeather() {
      const city = document.getElementById("city-name").value.trim();
      if (!city) return;

      const resultEl = document.getElementById("weather-result");
      resultEl.innerHTML = `<div class="loading">Gathering forecast...</div>`;

      try {
        const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;
        const response = await fetch(url);
        const data = await response.json();

        if (data.cod !== 200) {
          resultEl.innerHTML = `<div class="error-msg">City not found. Try another name.</div>`;
          return;
        }

        const emoji = getWeatherEmoji(data.weather[0].description);
        const temp = Math.round(data.main.temp);
        const feelsLike = Math.round(data.main.feels_like);
        const humidity = data.main.humidity;
        const wind = data.wind.speed;

        resultEl.innerHTML = `
          <div class="weather-content">
            <div class="weather-city">${data.name}</div>
            <div class="weather-country">${data.sys.country}</div>
            <div class="weather-main">
              <div class="weather-emoji">${emoji}</div>
              <div class="weather-temp">${temp}<sup>°C</sup></div>
            </div>
            <div class="weather-desc">${data.weather[0].description}</div>
            <div class="weather-divider"></div>
            <div class="weather-details">
              <div class="detail-item">
                <div class="detail-label">Feels Like</div>
                <div class="detail-value">${feelsLike}°C</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Humidity</div>
                <div class="detail-value">${humidity}%</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Wind</div>
                <div class="detail-value">${wind} m/s</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Condition</div>
                <div class="detail-value">${data.weather[0].main}</div>
              </div>
            </div>
          </div>`;
      } catch (err) {
        resultEl.innerHTML = `<div class="error-msg">Something went wrong. Try again.</div>`;
      }
    }

    document.getElementById('search-button').addEventListener('click', getWeather);
    document.getElementById('city-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') getWeather();
    });
  </script>
</body>
</html>
